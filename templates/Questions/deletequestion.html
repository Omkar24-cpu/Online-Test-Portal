{% extends 'base.html' %}

{% block content %}

<div class="text-center">

    <h1 class="main-title mb-4">

        Delete Question

    </h1>

    <div class="card shadow border-0 p-5">

        <h3 class="mb-4">

            Are you sure you want to delete this question?

        </h3>

        <h5 class="text-danger mb-4">

            {{ question.qtext }}

        </h5>

        <div>

            <a href="/deletequestion/{{ question.qno }}/"
               class="btn btn-danger btn-custom me-3">

               Yes Delete

            </a>

            <a href="/showallquestion/"
               class="btn btn-secondary btn-custom">

               Cancel

            </a>

        </div>

    </div>

</div>

{% endblock %}
