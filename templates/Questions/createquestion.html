{% extends 'base.html' %}

{% block content %}

<h1 class="main-title text-center mb-4">

    Create Question

</h1>

<form method="POST">

    {% csrf_token %}

    <input type="text"
           name="qtext"
           placeholder="Enter Question"
           class="form-control mb-3 p-3">

    <input type="text"
           name="op1"
           placeholder="Option 1"
           class="form-control mb-3 p-3">

    <input type="text"
           name="op2"
           placeholder="Option 2"
           class="form-control mb-3 p-3">

    <input type="text"
           name="op3"
           placeholder="Option 3"
           class="form-control mb-3 p-3">

    <input type="text"
           name="op4"
           placeholder="Option 4"
           class="form-control mb-3 p-3">

    <input type="text"
           name="corr_answer"
           placeholder="Correct Answer"
           class="form-control mb-3 p-3">

    <input type="text"
           name="subject"
           placeholder="Subject"
           class="form-control mb-4 p-3">

    <button type="submit"
            class="btn btn-primary btn-custom w-100">

        Save Question

    </button>

</form>

{% endblock %}
