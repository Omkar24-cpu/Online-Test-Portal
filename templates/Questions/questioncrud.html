{% extends 'base.html' %}

{% block content %}

<div class="text-center">

    <h1 class="main-title mb-4">

        Question Management

    </h1>

    <p class="text-muted mb-5">

        Create, Update, Delete and Manage Questions

    </p>

</div>

<div class="row g-4">

    <div class="col-md-6">

        <div class="card shadow border-0 p-4 text-center">

            <h3 class="mb-3">

                Create Questions

            </h3>

            <p>

                Add new questions for online exams.

            </p>

            <a href="/createquestion/"
               class="btn btn-primary btn-custom">

               Create Question

            </a>

        </div>

    </div>

    <div class="col-md-6">

        <div class="card shadow border-0 p-4 text-center">

            <h3 class="mb-3">

                Show Questions

            </h3>

            <p>

                View and manage all exam questions.

            </p>

            <a href="/showallquestion/"
               class="btn btn-success btn-custom">

               Show All Questions

            </a>

        </div>

    </div>

</div>

{% endblock %}
