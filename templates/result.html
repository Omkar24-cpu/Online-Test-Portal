{% extends 'base.html' %}

{% block content %}

<div class="text-center">

    <h1 class="main-title mb-4">

        Test Result

    </h1>

</div>

<div class="card shadow border-0 p-5 text-center">

    <h3 class="mb-4">

        Username :
        {{ username }}

    </h3>

    <h3 class="mb-4">

        Subject :
        {{ subject }}

    </h3>

    <h3 class="mb-4">

        Total Questions :
        {{ total_questions }}

    </h3>

    <h3 class="mb-4 text-success">

        Correct Answers :
        {{ correct_answers }}

    </h3>

    <h3 class="mb-4 text-danger">

        Wrong Answers :
        {{ wrong_answers }}

    </h3>

    <h1 class="text-primary">

        Score :
        {{ score }}%

    </h1>

</div>

{% endblock %}
