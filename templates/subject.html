{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-lg border-0 p-5">

            <div class="text-center mb-4">

                <h1 class="main-title">

                    Select Subject

                </h1>

                <p class="text-muted">

                    Choose your subject to start the online test

                </p>

            </div>

            <form action="/starttest/">

                <select name="subject"
                        class="form-control mb-4 p-3">

                    <option value="Python">

                        Python

                    </option>

                    <option value="Java">

                        Java

                    </option>

                    <option value="DBMS">

                        DBMS

                    </option>

                </select>

                <button type="submit"
                        class="btn btn-warning btn-custom w-100">

                    Start Test

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
