{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg border-0 p-4">

            <div class="text-center mb-4">

                <h2 class="fw-bold">

                    User Login

                </h2>

                <p class="text-muted">

                    Login to continue your test

                </p>

            </div>

            {% if error %}

            <div class="alert alert-danger">

                {{ error }}

            </div>

            {% endif %}

            <form method="POST"
                  action="/login/">

                {% csrf_token %}

                <input type="text"
                       name="username"
                       placeholder="Enter Username"
                       class="form-control mb-3 p-3"
                       required>

                <input type="password"
                       name="password"
                       placeholder="Enter Password"
                       class="form-control mb-4 p-3"
                       required>

                <button type="submit"
                        class="btn btn-dark w-100 btn-custom">

                    Login

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
